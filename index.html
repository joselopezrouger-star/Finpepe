<!DOCTYPE html>
<html lang="es-AR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Finpepe · Finanzas personales</title>
<meta name="description" content="Ordená tus finanzas personales: ingresos, gastos, tarjetas, ahorros y presupuestos, en pesos y dólares.">
<link rel="icon" type="image/png" href="assets/logo.png">
<link rel="apple-touch-icon" href="assets/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Barlow:wght@500;600;700;800&display=swap">
<link rel="stylesheet" href="styles.css">
<script>
  // Aplica el tema guardado antes de pintar la página, para evitar el
  // parpadeo de pasar de un tema a otro un instante después de cargar.
  // Por defecto arranca en oscuro (el look elegido); "light" lo pisa.
  try {
    var t = localStorage.getItem('finpepe:theme');
    if (t !== 'light') document.documentElement.setAttribute('data-theme', 'dark');
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
</script>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="brand">
      <img class="brand-mark" src="assets/logo.png" alt="" aria-hidden="true">
      <span class="brand-text">
        <span class="brand-name">Finpepe</span>
        <span class="brand-sub">finanzas personales</span>
      </span>
    </div>
    <div class="topbar-actions">
      <button id="theme-toggle" class="theme-toggle" type="button" title="Cambiar tema claro/oscuro">◐</button>
      <button id="account-chip" class="rate-chip" type="button" title="Cuenta y sincronización"></button>
      <button id="rate-chip" class="rate-chip" type="button" title="Cotización usada para convertir. Clic para actualizar."></button>
      <div class="seg" role="group" aria-label="Moneda de visualización">
        <button type="button" data-cur="ARS" class="seg-btn">$ ARS</button>
        <button type="button" data-cur="USD" class="seg-btn">US$ USD</button>
      </div>
      <button id="btn-new-tx" class="btn btn-primary" type="button">+ Movimiento</button>
    </div>
  </div>
</header>

<div id="banner" class="banner" hidden></div>

<main id="view" class="view"></main>

<footer class="footer">
  Tus datos se guardan únicamente en este navegador. Hacé copias de seguridad desde
  <a href="#" id="footer-backup">Ajustes → Datos</a>.
</footer>

<nav class="bottom-nav" aria-label="Secciones">
  <button type="button" data-group="inicio"><span class="bn-icon" aria-hidden="true">⌂</span><span class="bn-label">Inicio</span></button>
  <button type="button" data-group="movimientos"><span class="bn-icon" aria-hidden="true">⇅</span><span class="bn-label">Movimientos</span></button>
  <button type="button" data-group="cuentas"><span class="bn-icon" aria-hidden="true">▤</span><span class="bn-label">Cuentas</span></button>
  <button type="button" data-group="mas"><span class="bn-icon" aria-hidden="true">⋯</span><span class="bn-label">Más</span></button>
</nav>

<dialog id="dialog" class="dialog"></dialog>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/store.js"></script>
<script src="js/fx.js"></script>
<script src="js/cloud.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
</body>
</html>
